<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分店報銷系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-3xl overflow-hidden shadow-2xl">
   
    <div class="bg-indigo-600 text-white p-6">
      <h1 class="text-2xl font-black">REIMBURSEMENT</h1>
      <p class="text-indigo-100 text-sm">分店報銷製單系統</p>
    </div>

    <div class="p-6 space-y-6">
      <form id="form">
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1">日期 Date</label>
          <input type="date" id="date" class="w-full p-4 bg-slate-50 rounded-2xl" required>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-400 mb-1">分店 Branch</label>
            <select id="branch" class="w-full p-4 bg-slate-50 rounded-2xl" required>
              <option value="">選擇分店</option>
              <option value="碩門">碩門</option>
              <option value="柴灣">柴灣</option>
              <option value="順利">順利</option>
              <option value="樂華">樂華</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-400 mb-1">金額 Amount</label>
            <input type="number" step="0.1" id="amount" placeholder="0.00"
                   class="w-full p-4 bg-slate-50 rounded-2xl font-bold" required>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1">用途 Description</label>
          <input type="text" id="purpose" placeholder="例如：文具、維修..."
                 class="w-full p-4 bg-slate-50 rounded-2xl" required>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 mb-2">單據照片 Receipt</label>
          <div id="preview" onclick="document.getElementById('camera').click()"
               class="h-56 border-2 border-dashed border-slate-300 rounded-3xl flex items-center justify-center cursor-pointer hover:border-indigo-400 bg-slate-50 overflow-hidden">
            <i class="fa-solid fa-camera text-5xl text-indigo-400"></i>
          </div>
          <input type="file" id="camera" accept="image/*" capture="environment" class="hidden" onchange="handleImage(this)">
        </div>

        <div id="error" class="hidden bg-red-50 text-red-600 p-4 rounded-2xl text-sm"></div>
        <div id="success" class="hidden bg-green-50 text-green-600 p-4 rounded-2xl text-sm"></div>

        <button type="submit" id="submitBtn"
                class="w-full py-6 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-3xl text-lg shadow-lg transition-all">
          確認提交報銷
        </button>
      </form>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyi_pcGQI9WHyywn5xeDOq3JDiPrSYMv39gy56uqbsqH5DfeH_TTq369sXvn1oMePkGug/exec";

    let selectedImage = null;

    // 預設今日日期
    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    function handleImage(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          const max = 1100;
          if (w > max || h > max) {
            if (w > h) { h = Math.round(h * max / w); w = max; }
            else { w = Math.round(w * max / h); h = max; }
          }
          canvas.width = w; 
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          
          selectedImage = canvas.toDataURL('image/jpeg', 0.68);
          document.getElementById('preview').innerHTML = `<img src="${selectedImage}" class="w-full h-full object-contain">`;
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const date = document.getElementById('date').value;
      const branch = document.getElementById('branch').value;
      const purpose = document.getElementById('purpose').value;
      const amount = parseFloat(document.getElementById('amount').value);

      if (!selectedImage) return showMsg('error', '請上傳單據照片！');
      if (!branch || !purpose || !amount) return showMsg('error', '請填寫所有欄位！');

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 提交中...`;

      try {
        const data = {
          date: date,
          branch: branch,
          purpose: purpose,
          amount: amount,
          image: selectedImage
        };

        const response = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(data)
        });

        const text = await response.text();
        console.log("伺服器回應：", text);

        if (text.includes("success")) {
          showMsg('success', '✅ 提交成功！PDF 已自動生成');
          setTimeout(() => location.reload(), 2500);
        } else {
          showMsg('error', '提交失敗：' + (text || '未知錯誤'));
        }

      } catch (err) {
        console.error(err);
        showMsg('error', '提交失敗，請檢查網絡或確認 Web App 已設為「任何人可存取」');
      } finally {
        btn.disabled = false;
        btn.textContent = '確認提交報銷';
      }
    });

    function showMsg(type, text) {
      const error = document.getElementById('error');
      const success = document.getElementById('success');
      error.classList.add('hidden');
      success.classList.add('hidden');

      if (type === 'error') {
        error.textContent = text;
        error.classList.remove('hidden');
      } else {
        success.textContent = text;
        success.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
